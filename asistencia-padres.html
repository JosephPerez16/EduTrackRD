<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EduTrack RD | Asistencia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="asistencia.css">
</head>
<body>

<header class="header">
  <div class="logo">Edu<span>Track</span> RD</div>

  <nav class="nav">
    <a href="dashboard-padres.html">Panel</a>
    <a class="active" href="#">Asistencia</a>
    <a href="#">Soporte</a>
  </nav>
</header>

<main class="asistencia">

  <div class="top">

    <div>
      <h1>Asistencia</h1>
      <p>Monitoreo mensual del estudiante</p>
    </div>

    <div class="mes">
      Enero 2026
    </div>

  </div>

  <div class="layout">

    <section class="card calendario">

      <div class="card-header">
        <h3>Calendario</h3>
      </div>

      <div class="dias">
        <span>L</span><span>M</span><span>X</span>
        <span>J</span><span>V</span>
      </div>

      <div class="grid" id="calendario"></div>

    </section>

    <section class="card resumen">

      <div class="card-header">
        <h3>Resumen</h3>
      </div>

      <div class="chart-box">

        <canvas id="chart"></canvas>

        <div class="center-text">
          <span id="porcentaje"></span>
          <small>Asistencia</small>
        </div>

      </div>

      <div class="stats">

        <div>
          <b id="ok"></b>
          <span>Asistencias</span>
        </div>

        <div>
          <b id="fail"></b>
          <span>Faltas</span>
        </div>

        <div>
          <b id="late"></b>
          <span>Tardanzas</span>
        </div>

        <div>
          <b id="permiso"></b>
          <span>Permisos</span>
        </div>

      </div>

    </section>

  </div>

  <div class="back-btn">

    <button onclick="location.href='dashboard-padres.html'">
      ← Volver al Panel
    </button>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="asistencia.js"></script>

</body>
</html>
